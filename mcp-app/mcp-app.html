<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Teradata Query Visualizer</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(
          --font-sans,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif
        );
        background: var(--color-background-secondary, #f5f3ef);
        color: var(--color-text-primary, #1a1a1a);
        padding: 12px;
      }

      .card {
        background: var(--color-background-primary, #ffffff);
        border-radius: 12px;
        border: 1px solid var(--color-border-primary, #e5e5e5);
        overflow: hidden;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px 12px;
        gap: 12px;
        flex-wrap: wrap;
      }

      .card-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--color-text-primary, #1a1a1a);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .control-group {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .control-group label {
        font-size: 12px;
        font-weight: 500;
        color: var(--color-text-secondary, #999);
        white-space: nowrap;
      }

      select {
        padding: 5px 10px;
        border: 1px solid var(--color-border-primary, #d4d4d4);
        border-radius: 8px;
        font-size: 13px;
        font-family: inherit;
        background: var(--color-background-primary, #fff);
        color: var(--color-text-primary, #1a1a1a);
        cursor: pointer;
        outline: none;
        transition: border-color 0.15s;
        max-width: 200px;
      }

      select:focus {
        border-color: var(--color-accent-primary, #4f46e5);
      }

      select:hover {
        border-color: var(--color-border-secondary, #aaa);
      }

      #chart {
        width: 100%;
        height: 480px;
      }

      .status-message {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 120px;
        color: var(--color-text-secondary, #888);
        font-size: 14px;
        text-align: center;
        padding: 20px;
        word-break: break-word;
        overflow-wrap: break-word;
      }

      .status-message.error {
        color: var(--color-danger, #dc3545);
        font-family: monospace;
        font-size: 13px;
        text-align: left;
        white-space: pre-wrap;
        align-items: flex-start;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <span class="card-title" id="card-title">Query Results</span>
        <div class="controls">
          <div class="control-group">
            <select id="chart-type">
              <optgroup label="Bar Charts">
                <option value="basic">Basic Bar</option>
                <option value="grouped">Grouped Bar</option>
                <option value="stacked">Stacked Bar</option>
                <option value="horizontal">Horizontal Bar</option>
                <option value="stacked-horizontal">Stacked Horizontal</option>
                <option value="sorted">Sorted Bar</option>
                <option value="waterfall">Waterfall</option>
                <option value="rounded">Rounded Bar</option>
                <option value="polar">Polar Bar</option>
              </optgroup>
              <optgroup label="Line Charts">
                <option value="line-basic">Basic Line</option>
                <option value="line-smooth">Smooth Line</option>
                <option value="line-area">Area</option>
                <option value="line-stacked-area">Stacked Area</option>
                <option value="line-step">Step Line</option>
              </optgroup>
              <optgroup label="Pie Charts">
                <option value="pie">Pie</option>
                <option value="doughnut">Doughnut</option>
                <option value="rose">Rose / Nightingale</option>
              </optgroup>
              <optgroup label="Scatter Charts">
                <option value="scatter">Scatter</option>
                <option value="bubble">Bubble</option>
              </optgroup>
              <optgroup label="Mixed">
                <option value="bar-line">Bar + Line</option>
              </optgroup>
            </select>
          </div>
          <div class="control-group">
            <label for="x-column">X:</label>
            <select id="x-column"></select>
          </div>
        </div>
      </div>
      <div id="chart">
        <div class="status-message">Waiting for query results...</div>
      </div>
    </div>
    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
