<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Teradata Query Visualizer</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(
          --font-sans,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif
        );
        background: var(--color-background-primary, #ffffff);
        color: var(--color-text-primary, #1a1a1a);
      }

      .controls {
        padding: 10px 16px;
        background: var(--color-background-secondary, #f5f5f5);
        border-bottom: 1px solid var(--color-border-primary, #e0e0e0);
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .control-group {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .control-group label {
        font-size: 13px;
        font-weight: 500;
        color: var(--color-text-secondary, #666);
        white-space: nowrap;
      }

      select {
        padding: 5px 8px;
        border: 1px solid var(--color-border-primary, #d0d0d0);
        border-radius: var(--border-radius-md, 6px);
        font-size: 13px;
        font-family: inherit;
        background: var(--color-background-primary, #fff);
        color: var(--color-text-primary, #1a1a1a);
        cursor: pointer;
        outline: none;
        transition: border-color 0.15s;
        max-width: 200px;
      }

      select:focus {
        border-color: var(--color-accent-primary, #4f46e5);
      }

      select:hover {
        border-color: var(--color-border-secondary, #aaa);
      }

      .chart-container {
        padding: 4px;
      }

      #chart {
        width: 100%;
        height: 520px;
      }

      .status-message {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 120px;
        color: var(--color-text-secondary, #888);
        font-size: 14px;
        text-align: center;
        padding: 20px;
        word-break: break-word;
        overflow-wrap: break-word;
      }

      .status-message.error {
        color: var(--color-danger, #dc3545);
        font-family: monospace;
        font-size: 13px;
        text-align: left;
        white-space: pre-wrap;
        align-items: flex-start;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <div class="control-group">
        <label for="chart-type">Chart:</label>
        <select id="chart-type">
          <optgroup label="Bar Charts">
            <option value="basic">Basic Bar</option>
            <option value="grouped">Grouped Bar</option>
            <option value="stacked">Stacked Bar</option>
            <option value="horizontal">Horizontal Bar</option>
            <option value="stacked-horizontal">Stacked Horizontal</option>
            <option value="sorted">Sorted Bar</option>
            <option value="waterfall">Waterfall</option>
            <option value="rounded">Rounded Bar</option>
            <option value="polar">Polar Bar</option>
          </optgroup>
          <optgroup label="Line Charts">
            <option value="line-basic">Basic Line</option>
            <option value="line-smooth">Smooth Line</option>
            <option value="line-area">Area</option>
            <option value="line-stacked-area">Stacked Area</option>
            <option value="line-step">Step Line</option>
          </optgroup>
          <optgroup label="Pie Charts">
            <option value="pie">Pie</option>
            <option value="doughnut">Doughnut</option>
            <option value="rose">Rose / Nightingale</option>
          </optgroup>
          <optgroup label="Scatter Charts">
            <option value="scatter">Scatter</option>
            <option value="bubble">Bubble</option>
          </optgroup>
          <optgroup label="Mixed">
            <option value="bar-line">Bar + Line</option>
          </optgroup>
        </select>
      </div>
      <div class="control-group">
        <label for="x-column">X-Axis:</label>
        <select id="x-column"></select>
      </div>
    </div>
    <div class="chart-container">
      <div id="chart">
        <div class="status-message">Waiting for query results...</div>
      </div>
    </div>
    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
